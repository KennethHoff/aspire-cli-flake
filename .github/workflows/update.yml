name: Update Aspire CLI versions

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Update all channels
        run: ./update.sh

      - name: Create PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update Aspire CLI versions"
          title: "chore: update Aspire CLI versions"
          body: "Automated weekly update of Aspire CLI versions across all channels."
          branch: auto-update-aspire-cli
          delete-branch: true
