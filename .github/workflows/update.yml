name: Update Aspire CLI versions

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: cachix/install-nix-action@v30

      - name: Update all channels
        run: ./update.sh

      - name: Create PR if changed
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update Aspire CLI versions"
          title: "chore: update Aspire CLI versions"
          body: >
            Automated weekly update of Aspire CLI versions across all channels.
          branch: auto-update-aspire-cli
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
